name: Build Android APK

on:
  push:
    branches:
      - main    # သင့် Project ရဲ့ Main Branch နာမည် (main သို့မဟုတ် master) ဖြစ်ရပါမယ်
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu' # သို့မဟုတ် 'temurin'
        java-version: '17'   # Project က တောင်းဆိုထားတဲ့ Java Version 17[span_1](start_span)[span_1](end_span)

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    # Gradle Build Toolkit အတွက် Execute လုပ်ပိုင်ခွင့် (Permission) ပေးခြင်း
    - name: Grant Execute Permission for Gradlew
      run: chmod +x gradlew

    # Debug APK အဖြစ် Build လုပ်ခြင်း (ယခု လောလောဆယ် Signing Key မလိုဘဲ အလုပ်လုပ်ပါမယ်)[span_2](start_span)[span_2](end_span)
    - name: Build Debug APK
      run: ./gradlew assembleDebug[span_3](start_span)[span_3](end_span)

    # ထွက်လာတဲ့ APK ဖိုင်ကို GitHub Actions မှာ Artifact အနေနဲ့ Download ဆွဲလို့ရအောင် သိမ်းဆည်းခြင်း
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Login-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk[span_4](start_span)[span_4](end_span)
